name: Tend
options:
  bundleIdPrefix: to.every
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "SXTJ272RTK"
    CODE_SIGN_STYLE: Automatic

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    exactVersion: 2.47.0

targets:
  Tend:
    type: application
    platform: iOS
    sources:
      - path: Tend
        excludes:
          - Info.plist
    resources:
      - path: Tend/Assets.xcassets
    configFiles:
      Debug: Config/Base.xcconfig
      Release: Config/Base.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: to.every.tend
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Tend/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: "NO"
    info:
      path: Tend/Info.plist
      properties:
        CFBundleDisplayName: Tend
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - to.every.tend
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        TEND_SUPABASE_URL: $(TEND_SUPABASE_URL)
        TEND_SUPABASE_PUBLISHABLE_KEY: $(TEND_SUPABASE_PUBLISHABLE_KEY)
        TEND_ALLOWED_EMAIL: $(TEND_ALLOWED_EMAIL)
  TendTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TendTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Tend
  TendUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TendUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Tend

schemes:
  Tend:
    build:
      targets:
        Tend: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TendTests
        - TendUITests
